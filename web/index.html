<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="./stylings/index.css">

        <title>S-LOGGER</title>
    </head>
    
    <body>
        <header>
            <p id="main-title">S-LOGGER</p>
            <nav  id="ribbons">
                <ul>
                    <li>
                        <img src="./assets/icons/new-log-icon.png" class="icons">
                        <button id="new-log-btn">NEW LOG</button>
                    </li>
                    <li>
                        <img src="./assets/icons/new-log-icon.png" class="icons">
                        <button id="new-proj-btn">NEW PROJECT</button>
                    </li>
                    <li><a href="#">VIEW</a></li>
                    <li id="search-logs">
                        <span id="search-label">SEARCH</span>
                        <input type="text" id="search-input" placeholder="Type to search">
                    </li>
                </ul>
            </nav>
        </header>
        
        <main>
            <!-- RIGHT PANEL -->
            <div id="explorer-panel" class="mother-panels">
                <div id="logs-explorer">
                    <img src="./assets/icons/filter-icon.png" class="icons">
                    <label for="select-sort">Sort by: </label>
                    <select name="sort" id="select-sort">
                        <option value="pinned">Pinned</option>
                        <option value="one-week">Within 7 days</option>
                        <option value="one-fortnite">Within a fortnite</option>
                        <option value="one-month">Within 30 days</option>
                    </select>
                    
                    <div id="logs-list"></div>
                </div>
            </div>
            
            
            <!-- LEFT PANEL -->
            <div id="logging-panel" class="mother-panels">
                <div id="console-body">
                    <div id="console-header">
                        <p id="log-title">[log title]</p>
                        <div id="clocks" title="more clocks">
                            <p id="time-displayer"></p>
                            <p id="date-displayer"></p>
                        </div>
                    </div>

                    <div id="logs-field">

                    </div>
                </div>
            </div>
        </main>
        
        <footer></footer>


        <!-- MODALS - hidden by default -->
        
        <!-- NEW LOG MODAL -->
        <div id="new-log-modal" class="modal hidden">
            <div id="new-log-content" class="modal-content">
                <h3 class="modal-title">New Log</h3>
                <form id="new-log-form">
                    <label for="new-log-name-text">Log Title</label>
                    <input type="text" id="new-log-name-text" alt="Enter log name here">
                    <br>

                    <label for="new-log-tags">Tag</label>
                    <select id="new-log-tags">
                        <option value="anecdote-tag">Andecdote</option>
                        <option value="coding-tag">Coding</option>
                        <option value="ecclesiastical-tag">Ecclesiastical</option>
                    </select>
    
                    <div id="project-toggle">
                        <input type="checkbox" id="under-project-check">
                        <label for="under-project-check">Under a Project?</label>
                    </div>
                    <br>

                    <div id="confirm-new-log">
                        <button type="button" id="cancel-log-btn" class="modal-cancel-btn modal-btn">Cancel</button>
                        <button type="submit" id="confirm-log-btn" class="modal-confirm-btn modal-btn">Initialize Log</button>
                    </div>
                </form>
            </div>
        </div>
        


        <script src="./scripts/showSearchLogic.js"></script>
        <script src="./scripts/dateTimeLogics.js"></script>
        <script src="./scripts/newLogInit.js"></script>
    </body>
</html>
