<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="./stylings/index.css">

        <title>S-LOGGER</title>
    </head>
    
    <body>
        <header>
            <span id="main-title">S-LOGGER</span>
            <nav  id="ribbons">
                <span>New log</span>
                <span>View</span>
            </nav>
        </header>
        
        <main>
            <div id="explorer-panel" class="mother-panels">
                <div id="clocks"><p>Time goes here</p></div>
                
                <div id="logs-explorer">
                    <label for="select-sort">Sort</label>
                    <select name="sort" id="select-sort">
                        <option value="update">Last Updated</option>
                        <option value="starred">Starred</option>
                        <option value="most-logs">Most Logs</option>
                    </select>

                    <div id="logs-list"></div>
                </div>
            </div>


            <div id="logging-panel" class="mother-panels">
                <p>logging is here</p>
            </div>
        </main>
        
        <footer></footer>
    </body>
</html>
