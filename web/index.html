<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="./stylings/index.css">

        <title>S-LOGGER</title>
    </head>
    
    <body>
        <header>
            <span id="main-title">S-LOGGER</span>
            <nav  id="ribbons">
                <ul>
                    <li>
                        <img src="./assets/icons/new-log-icon.png" class="icons">
                        <a href="#">NEW LOG</a>
                    </li>
                    <li><a href="#">VIEW</a></li>
                    <li id="search-logs">
                        <span id="search-label">SEARCH</span>
                        <input type="text" id="search-input" placeholder="Type to search">
                    </li>
                </ul>
            </nav>
        </header>
        
        <main>
            <div id="explorer-panel" class="mother-panels">
                <div id="logs-explorer">
                    <img src="./assets/icons/filter-icon.png" class="icons">
                    <label for="select-sort">Sort by: </label>
                    <select name="sort" id="select-sort">
                        <option value="pinned">Pinned</option>
                        <option value="one-week">Within 7 days</option>
                        <option value="one-fortnite">Within a fortnite</option>
                        <option value="one-month">Within 30 days</option>
                    </select>
                    
                    <div id="logs-list"></div>
                </div>
            </div>
            
            
            <div id="logging-panel" class="mother-panels">
                <div id="console-body">
                    <div id="console-header">
                        <label id="log-title">[log title]</label>
                        <div id="clocks" title="more clocks">
                            <p id="time-displayer"></p>
                            <p id="date-displayer"></p>
                        </div>
                    </div>

                    <div id="logs-field">

                    </div>
                </div>
            </div>
        </main>
        
        <footer></footer>

        <script src="./scripts/showSearchLogic.js"></script>
        <script src="./scripts/dateTimeLogics.js"></script>
    </body>
</html>
